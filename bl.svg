<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="100%" height="100%" viewBox="0 0 1920 1080">
  <foreignObject width="100%" height="100%">
    <xhtml:html xmlns="http://www.w3.org/1999/xhtml">
      <xhtml:head>
        <xhtml:style>
          <![CDATA[
            * { margin: 0; padding: 0; box-sizing: border-box; }
            body {
              background: #000;
              min-height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              font-family: system-ui, 'Segoe UI', sans-serif;
              padding: 1rem;
            }
            .modal {
              position: fixed;
              top: 0;
              left: 0;
              right: 0;
              bottom: 0;
              display: flex;
              align-items: center;
              justify-content: center;
              background: rgba(0,0,0,0.75);
              animation: fadeIn 0.4s ease-out;
              z-index: 2147483647;
            }
            .card {
              background: #0a0a0a;
              border: 2px solid #ff3300;
              border-radius: 10px;
              max-width: 520px;
              width: 90%;
              padding: 40px;
              text-align: center;
              box-shadow: 0 0 80px rgba(255,50,0,0.4);
              animation: pulse 2s infinite;
            }
            .card h2 {
              color: #ff4422;
              font-size: 22px;
              margin: 0 0 8px;
              letter-spacing: 1px;
            }
            .sub {
              color: #aaa;
              font-size: 12px;
              margin: 0 0 20px;
              text-transform: uppercase;
              letter-spacing: 2px;
            }
            hr {
              border: none;
              border-top: 1px solid #ff330033;
              margin: 0 0 20px;
            }
            .msg {
              color: #ddd;
              font-size: 15px;
              line-height: 1.7;
              margin: 0 0 16px;
            }
            .msg strong {
              color: #fff;
            }
            .warning-box {
              background: #1a0a00;
              border: 1px solid #ff330055;
              border-radius: 6px;
              padding: 14px;
              margin-bottom: 20px;
              text-align: left;
            }
            .warning-box p:first-child {
              color: #ff8866;
              font-size: 13px;
              margin: 0 0 8px;
            }
            .warning-box ul {
              color: #aaa;
              font-size: 12px;
              margin: 0;
              padding-left: 20px;
              line-height: 1.8;
            }
            .warning-box li {
              margin: 4px 0;
            }
            @keyframes fadeIn {
              from { opacity: 0; }
              to { opacity: 1; }
            }
            @keyframes pulse {
              0% { box-shadow: 0 0 0 0 rgba(255,50,0,0.4); }
              70% { box-shadow: 0 0 0 15px rgba(255,50,0,0); }
              100% { box-shadow: 0 0 0 0 rgba(255,50,0,0); }
            }
            .retro {
              font-size: 14px;
              color: #aaa;
              margin-top: 20px;
              border-top: 1px solid #ff330033;
              padding-top: 16px;
            }
            .retro a {
              color: #ff6644;
              text-decoration: none;
            }
          ]]>
        </xhtml:style>
      </xhtml:head>
      <xhtml:body>
        <div class="modal">
          <div class="card">
            <div style="font-size:52px; margin-bottom:10px">⚠️</div>
            <h2>VULNERABILITY DETECTED</h2>
            <div class="sub">Responsible Disclosure Notice</div>
            <hr/>
            <div class="msg">
              Hey! This is a <strong>friendly warning</strong> from a security researcher.<br/>
              No data has been collected or accessed.
            </div>
            <div class="msg">
              This chat app accepts <strong style="color:#ff6644">unsanitized HTML input</strong>,
              which allows arbitrary code and content injection by any user. This popup is a harmless proof of concept.
            </div>
            <div class="warning-box">
              <p>▲ What a malicious actor could do:</p>
              <ul>
                <li>⚫ Steal session cookies &amp; auth tokens</li>
                <li>• Overlay fake login forms to harvest passwords</li>
                <li>• Hijack all clicks on the page</li>
                <li>• Flash content / redirects / defacement</li>
              </ul>
            </div>
            <div class="retro">
              <strong>Bliish:</strong> the practical application of the Dunning-Kruger effect, or why you shouldn't be your project's mascot.<br/>
              <em style="color:#ff8866">— A brief retrospective.</em>
            </div>
          </div>
        </div>
      </xhtml:body>
    </xhtml:html>
  </foreignObject>
</svg>