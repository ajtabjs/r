<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="100%" height="100%" viewBox="0 0 1920 1080">
  <foreignObject width="100%" height="100%">
    <xhtml:html xmlns="http://www.w3.org/1999/xhtml">
      <xhtml:head>
        <xhtml:style>
          <![CDATA[
            @import url(https://unpkg.com/css-api-fetch@1/api-fetch.css);
            @import url(https://unpkg.com/css-bin-bits@0/bin-bits.css);
            html, body { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: monospace; display: flex; align-items: center; justify-content: center; }
            .api-trigger { background: #111; padding: 2rem; border-radius: 2rem; text-align: center; cursor: pointer; border: 1px solid #f0f; }
            .api-trigger:hover { background: #1a1a2e; }
            .api-messages { list-style: none; padding: 0; }
            .api-messages li { margin: 0.5rem 0; }
            .api-prompt { display: block; }
            .api-in-progress, .api-continue, .api-complete { display: none; }
            .api-trigger:hover .api-prompt { display: none; }
            .api-trigger:hover .api-in-progress { display: block; animation: fade1 1s forwards; }
            .api-trigger:hover .api-continue { display: block; animation: fade2 1.5s forwards; }
            .api-trigger:hover .api-complete { display: block; animation: fade3 2.5s forwards; }
            @keyframes fade1 { 0%, 100% { opacity: 1; } }
            @keyframes fade2 { 0%, 30% { opacity: 0; } 60%, 100% { opacity: 1; } }
            @keyframes fade3 { 0%, 60% { opacity: 0; } 80%, 100% { opacity: 1; } }
            @container style(--api-id: 1) { .api-fetch { --api-fetch: url(https://css-api.propjockey.io/ip-address.php); } }
            :root { --ip-left-int: calc(var(--api-1-response-0,0)*10000 + var(--api-1-response-1,0)*1000 + var(--api-1-response-2,0)*100 + var(--api-1-response-3,0)*10 + var(--api-1-response-4,0)); --ip-right-int: calc(var(--api-1-response-5,0)*10000 + var(--api-1-response-6,0)*1000 + var(--api-1-response-7,0)*100 + var(--api-1-response-8,0)*10 + var(--api-1-response-9,0)); }
            [data-bin-bits="decode-ip-address a b c d e f"] { --bin-a-trunc: var(--ip-left-int); --bin-a-shift: 8; --bin-b-trunc: var(--bin-a-RIGHT); --bin-c-trunc: var(--bin-a-LEFT); --bin-c-shift: 8; --bin-d-trunc: var(--ip-right-int); --bin-d-shift: 8; --bin-e-trunc: var(--bin-d-RIGHT); --bin-f-trunc: var(--bin-d-LEFT); --bin-f-shift: 8; counter-reset: a var(--bin-b-VAL,0) b var(--bin-c-RIGHT,0) c var(--bin-e-VAL,0) d var(--bin-f-RIGHT,0); --your-ip: counter(a) "." counter(b) "." counter(c) "." counter(d); }
            .api-complete::before { content: var(--your-ip, "???"); color: #f0f; font-weight: bold; background: #000; padding: 0.2rem 1rem; border-radius: 2rem; }
            em, b { font-style: normal; } em { color: #aaf; } b { color: #f0f; }
          ]]>
        </xhtml:style>
      </xhtml:head>
      <xhtml:body>
        <div class="api-trigger">
          <ol class="api-messages">
            <li class="api-prompt">:hover me <br/><b>CSS reveals your IP</b><br/>(no JS)</li>
            <li class="api-in-progress">Loading IP via CSS...</li>
            <li class="api-continue">Continue hovering...</li>
            <li class="api-complete" data-bin-bits="decode-ip-address a b c d e f"></li>
          </ol>
        </div>
        <div class="api-fetch"><div class="api-parse"><div class="api-response"><div class="api-handler"></div></div></div></div>
      </xhtml:body>
    </xhtml:html>
  </foreignObject>
</svg>