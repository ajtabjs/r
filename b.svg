
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xhtml="http://www.w3.org/1999/xhtml" width="100%" height="100%" viewBox="0 0 1920 1080">
  <defs>
    <style>
      @import url(https://unpkg.com/css-api-fetch@1/api-fetch.css);
      @import url(https://unpkg.com/css-bin-bits@0/bin-bits.css);
    </style>
  </defs>
  
  <rect width="100%" height="100%" fill="#0a0a1a" />
  
  <foreignObject id="fo" width="100%" height="100%" x="0" y="0">
    <xhtml:html xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;margin:0;padding:0;">
      <xhtml:head>
        <xhtml:meta charset="UTF-8" />
        <xhtml:title>CSS API Fetch: IP Revealer (Pure CSS)</xhtml:title>
        <xhtml:style>
          /* ---------- RESET & GLOBAL ---------- */
          * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
          }

          html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: radial-gradient(circle at 20% 30%, #0a0a1a, #000000);
            font-family: 'Segoe UI', system-ui, 'SF Mono', 'Fira Code', monospace, sans-serif;
          }

          /* main container */
          .css-api-fetch {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1200px;
          }

          /* debug badge */
          .api-debug-off {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.65);
            backdrop-filter: blur(8px);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 13px;
            color: #c0c0ff;
            font-family: monospace;
            pointer-events: none;
            z-index: 999;
            border: 1px solid rgba(255,0,199,0.4);
            letter-spacing: 0.5px;
          }
          .api-debug-off::before {
            content: "⚡ CSS-only · no JS · IP hover-reveal";
          }

          /* main trigger card */
          .api-trigger {
            width: 88vw;
            max-width: 760px;
            background: rgba(10, 12, 28, 0.75);
            backdrop-filter: blur(16px);
            border-radius: 72px;
            padding: 2.2rem 2rem;
            box-shadow: 0 30px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(129, 0, 240, 0.4);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            cursor: pointer;
            border: 1px solid rgba(255, 0, 199, 0.5);
          }
          .api-trigger:hover {
            background: rgba(8, 10, 24, 0.9);
            box-shadow: 0 35px 60px rgba(0,0,0,0.7), 0 0 0 2px #ff00c7;
            transform: scale(1.01);
          }

          /* message list */
          .api-messages {
            list-style: none;
            text-align: center;
            margin: 0;
            padding: 0;
            position: relative;
          }

          .api-messages li {
            font-size: clamp(1rem, 5.8vw, 1.85rem);
            font-weight: 500;
            padding: 0.8rem 0.5rem;
            transition: opacity 0.2s;
            background: transparent;
            border-radius: 60px;
            line-height: 1.4;
          }

          /* default visible: prompt only */
          .api-messages .api-prompt {
            display: block;
            opacity: 1;
            color: #f5f5ff;
            text-shadow: 0 2px 6px rgba(0,0,0,0.6);
            background: rgba(0,0,0,0.2);
            backdrop-filter: blur(4px);
          }
          .api-messages .api-in-progress,
          .api-messages .api-continue,
          .api-messages .api-complete {
            display: none;
          }

          /* CPU meters (visual feedback) */
          .api-cpu {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 32px;
            list-style: none;
            padding: 0;
          }
          .api-cpu li {
            width: 18px;
            height: 18px;
            background: #2a2a4a;
            border-radius: 4px;
            transition: all 0.15s;
            box-shadow: 0 0 2px rgba(255,0,199,0.3);
          }

          /* ---------- CSS-ONLY STATE MACHINE (hover reveal IP) ---------- */
          /* The core mechanism: using CSS custom properties from api-fetch, 
             container queries and bin-bits to decode IP, then display via counter. */

          /* Container style for API trigger (enables conditional fetch) */
          @container style(--api-id: 1) {
            .api-fetch { 
              --api-fetch: url(https://css-api.propjockey.io/ip-address.php); 
            }
          }

          /* root IP math using response digits */
          :root {
            --ip-left-int: calc(
              var(--api-1-response-0, 0) * 10000 +
              var(--api-1-response-1, 0) * 1000 +
              var(--api-1-response-2, 0) * 100 +
              var(--api-1-response-3, 0) * 10 +
              var(--api-1-response-4, 0)
            );
            --ip-right-int: calc(
              var(--api-1-response-5, 0) * 10000 +
              var(--api-1-response-6, 0) * 1000 +
              var(--api-1-response-7, 0) * 100 +
              var(--api-1-response-8, 0) * 10 +
              var(--api-1-response-9, 0)
            );
          }

          /* Decode IP using bin-bits utilities */
          [data-bin-bits="decode-ip-address a b c d e f"] {
            --bin-a-trunc: var(--ip-left-int);
            --bin-a-shift: 8;
            --bin-b-trunc: var(--bin-a-RIGHT);
            /* var(--bin-b-VAL) = first byte */
            --bin-c-trunc: var(--bin-a-LEFT);
            --bin-c-shift: 8;
            /* var(--bin-c-RIGHT) = second byte */
            --bin-d-trunc: var(--ip-right-int);
            --bin-d-shift: 8;
            --bin-e-trunc: var(--bin-d-RIGHT);
            /* var(--bin-e-VAL) = third byte */
            --bin-f-trunc: var(--bin-d-LEFT);
            --bin-f-shift: 8;
            /* var(--bin-f-RIGHT) = fourth byte */
            
            counter-reset: a var(--bin-b-VAL, 0)
                           b var(--bin-c-RIGHT, 0)
                           c var(--bin-e-VAL, 0)
                           d var(--bin-f-RIGHT, 0);
            
            --your-ip-address: counter(a) "." counter(b) "." counter(c) "." counter(d);
            
            &::before {
              content: var(--your-ip-address);
              color: #ff00c7;
              font-weight: bold;
              font-size: 1.4em;
              letter-spacing: 1px;
              background: rgba(0,0,0,0.5);
              padding: 0.2em 0.6em;
              border-radius: 60px;
              display: inline-block;
              backdrop-filter: blur(12px);
              font-family: monospace;
            }
          }

          /* Hover sequence: step-by-step reveal of API messages */
          .api-trigger {
            container-name: api-trigger;
            container-type: inline-size;
          }

          /* simulate fetch phases on hover via style queries + pseudo classes */
          /* Phase 1: on hover, show "Loading" after slight delay (controlled via transition) */
          .api-trigger:hover .api-messages .api-prompt {
            display: none;
          }
          
          .api-trigger:hover .api-messages .api-in-progress {
            display: block;
            animation: fadeInStep 0.2s ease;
          }
          
          /* delay to simulate network → then continue step */
          .api-trigger:hover .api-messages .api-in-progress {
            opacity: 1;
          }
          
          /* Using CSS custom property trick to chain states: we use :has + hover duration? but simpler: 
             We rely on actual api-fetch completion + second hover state. For better UX, we add a second 
             hover class after initial hover (but since we need only CSS, we make the messages appear sequentially
             on continued hover: after 0.8s, change to continue, after 1.6s show IP. No JS! */
          
          .api-trigger {
            --step: 0;
            transition: --step 0s;
          }
          
          /* CSS-only timed steps using transition-delay on custom property? 
             We'll implement using sibling elements & animation delays for message swap */
          
          .api-messages .api-in-progress {
            animation: showThenHide 2.2s forwards;
          }
          
          .api-messages .api-continue {
            animation: showAfterDelay 2.2s forwards;
          }
          
          .api-messages .api-complete {
            animation: showAfterLongDelay 4s forwards;
          }
          
          @keyframes showThenHide {
            0%, 30% { display: block; opacity: 1; }
            70%, 100% { display: none; opacity: 0; }
          }
          
          @keyframes showAfterDelay {
            0%, 35% { display: none; opacity: 0; }
            45%, 85% { display: block; opacity: 1; }
            100% { display: none; opacity: 0; }
          }
          
          @keyframes showAfterLongDelay {
            0%, 70% { display: none; opacity: 0; }
            80%, 100% { display: block; opacity: 1; }
          }
          
          /* ensure initial hidden states */
          .api-messages .api-in-progress,
          .api-messages .api-continue,
          .api-messages .api-complete {
            display: none;
          }
          
          .api-trigger:hover .api-messages .api-in-progress {
            animation: showThenHide 2.2s forwards;
            display: block;
          }
          
          .api-trigger:hover .api-messages .api-continue {
            animation: showAfterDelay 2.2s forwards;
          }
          
          .api-trigger:hover .api-messages .api-complete {
            animation: showAfterLongDelay 4s forwards;
          }
          
          /* Additionally, CPU meters animate on hover: phase activity */
          .api-trigger:hover .api-cpu-phase-0 {
            background: #ff00c7;
            box-shadow: 0 0 6px #ff00c7;
          }
          .api-trigger:hover .api-cpu-phase-1 {
            background: #ff66e0;
            transition-delay: 0.15s;
          }
          .api-trigger:hover .api-cpu-phase-2 {
            background: #c04eff;
            transition-delay: 0.3s;
          }
          .api-trigger:hover .api-cpu-phase-3 {
            background: #8a2be2;
            transition-delay: 0.45s;
          }
          
          /* for the transfer-value cpu groups, additional pulsation */
          .api-handler .api-cpu li {
            transition: background 0.2s, box-shadow 0.2s;
          }
          .api-trigger:hover .api-handler .api-cpu li {
            background: #ff44cc;
            animation: pulseCpu 0.8s infinite alternate;
          }
          
          @keyframes pulseCpu {
            0% { opacity: 0.4; transform: scale(0.9); background: #ff66dd; }
            100% { opacity: 1; transform: scale(1.1); background: #ff00c7; }
          }
          
          /* IP complete block styling */
          .api-complete[data-bin-bits="decode-ip-address a b c d e f"] {
            margin-top: 18px;
            padding: 18px 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 68px;
            font-weight: bold;
            font-size: 1.8rem;
            text-align: center;
            letter-spacing: 2px;
          }
          
          .api-complete::before {
            font-size: 1.9rem;
            font-weight: bold;
            text-shadow: 0 0 6px #ff00c7;
          }
          
          /* text styles */
          em { 
            font-weight: bold; 
            color: #b77eff; 
            font-style: normal;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 6px;
          }
          b { color: #ff66e5; }
          
          /* fullscreen flex for trigger */
          .your-ip-trigger {
            line-height: 1.6;
            text-shadow: 0px 0px 1vw rgba(0,0,0,0.6);
            display: grid;
            align-items: center;
            justify-items: center;
            width: 100%;
            height: 100%;
          }
          .your-ip-trigger .api-messages {
            margin: auto;
            width: 100%;
          }
          
          /* additional api-cpu meters for the complex structure (original POC style) */
          .api-cpu li.api-cpu-phase-0,
          .api-cpu li.api-cpu-phase-1,
          .api-cpu li.api-cpu-phase-2,
          .api-cpu li.api-cpu-phase-3 {
            background: #2f2f5a;
          }
          
          .api-transfer-value-0, .api-transfer-value-1, .api-transfer-value-2,
          .api-transfer-value-3, .api-transfer-value-4, .api-transfer-value-5,
          .api-transfer-value-6, .api-transfer-value-7, .api-transfer-value-8,
          .api-transfer-value-9, .api-transfer-complete {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin: 6px 0;
          }
          
          .api-handler {
            margin-top: 20px;
            padding: 8px;
            background: rgba(0,0,0,0.2);
            border-radius: 48px;
          }
          
          /* ensure final IP shows on completion */
          .api-trigger:hover .api-complete[data-bin-bits]::before {
            animation: glowText 0.5s ease;
          }
          
          @keyframes glowText {
            0% { text-shadow: 0 0 0 #ff00c7; opacity: 0.6; }
            100% { text-shadow: 0 0 12px #ff00c7, 0 0 4px #fff; opacity: 1; }
          }
          
          /* subtle additional */
          .api-fetch, .api-parse, .api-response, .api-handler {
            width: 100%;
          }
          
          /* mobile responsiveness */
          @media (max-width: 700px) {
            .api-trigger { padding: 1.5rem 1rem; width: 92vw; border-radius: 48px; }
            .api-messages li { font-size: 1.1rem; }
            .api-complete::before { font-size: 1.3rem; }
          }
          
          /* extra smoothness */
          body {
            display: flex;
            align-items: center;
            justify-content: center;
          }
        </xhtml:style>
      </xhtml:head>
      <xhtml:body>
        <div class="css-api-fetch">
          <div class="api-debug-off"></div>
          <div class="api-trigger your-ip-trigger">
            <ol class="api-messages">
              <li class="api-prompt">
                All you need to do is <em>:hover</em> me &amp;<br>
                <b>CSS will reveal your IP Address</b><br>
                <span style="font-size:0.8rem;">⚡ There is no JavaScript involved.</span>
              </li>
              <li class="api-in-progress">
                Loading <b>your IP Address</b><br>onto <em>:root</em> with CSS...
              </li>
              <li class="api-continue">
                Please, continue to <em>:hover</em><br>until <b>I know where you are</b>.
              </li>
              <li class="api-complete" data-bin-bits="decode-ip-address a b c d e f"></li>
            </ol>
            <ol class="api-cpu">
              <li class="api-cpu-phase-0"></li>
              <li class="api-cpu-phase-1"></li>
              <li class="api-cpu-phase-2"></li>
              <li class="api-cpu-phase-3"></li>
            </ol>
          </div>
          <div class="api-fetch">
            <div class="api-parse">
              <div class="api-response">
                <div class="api-handler">
                  <!-- hidden cpu arrays for API transfer simulation (visual only) -->
                  <ol class="api-transfer-value-0 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-1 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-2 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-3 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-4 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-5 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-6 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-7 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-8 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-value-9 api-cpu"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                  <ol class="api-transfer-complete api-cpu api-id-1"><li class="api-cpu-phase-0"></li><li class="api-cpu-phase-1"></li><li class="api-cpu-phase-2"></li><li class="api-cpu-phase-3"></li></ol>
                </div>
              </div>
            </div>
          </div>
        </div>
      </xhtml:body>
    </xhtml:html>
  </foreignObject>
</svg>
